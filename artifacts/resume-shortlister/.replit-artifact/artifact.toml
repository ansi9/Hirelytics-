kind = "web"
previewPath = "/"
title = "Hirelytics"
version = "1.0.0"
id = "artifacts/resume-shortlister"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23023

[services.development]
run = "pnpm --filter @workspace/resume-shortlister run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-shortlister", "run", "build" ]
publicDir = "artifacts/resume-shortlister/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23023"
BASE_PATH = "/"
